name: Publish MLB Pages

on:
  schedule:
    # GitHub Actions cron 使用 UTC。
    # 这里覆盖每天 16:00 UTC 到次日 02:30 UTC，每 10 分钟运行一次。
    - cron: "*/10 16-23 * * *"
    - cron: "*/10 0-1 * * *"
    - cron: "0,10,20,30 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      TZ: America/Los_Angeles

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: python -m pip install -r requirements.txt

      - name: Sync Recent Games
        run: python scripts/sync_site.py

      - name: Commit Generated Site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No site changes to commit."
          else
            git commit -m "Update generated MLB pages"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
